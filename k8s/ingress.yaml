# TLS/cert-manager disabled for home server deployment.
# To enable HTTPS on a public cluster:
#   1. Install cert-manager
#   2. Uncomment the tls section and cert-manager annotation
#   3. Add the ClusterIssuer back (see git history)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: acip-ingress
  namespace: acip
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: api.acip.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: acip-api-svc
                port:
                  number: 3004
