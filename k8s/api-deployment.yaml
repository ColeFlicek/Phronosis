apiVersion: v1
kind: Service
metadata:
  name: acip-api-svc
  namespace: acip
spec:
  type: NodePort
  selector:
    app: acip-api
  ports:
    - port: 3004
      targetPort: 3004
      nodePort: 30040
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: acip-api
  namespace: acip
spec:
  replicas: 2
  selector:
    matchLabels:
      app: acip-api
  template:
    metadata:
      labels:
        app: acip-api
    spec:
      containers:
        - name: acip-api
          image: ghcr.io/coleflicek/acip:latest  # updated by CI
          ports:
            - containerPort: 3004
          envFrom:
            - secretRef:
                name: acip-secrets
            - configMapRef:
                name: acip-config
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3004
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3004
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
