name: Build and Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: coleflicek/acip

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: acip
          POSTGRES_PASSWORD: acip
          POSTGRES_DB: acip_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get install -y libpq-dev postgresql-client

      - name: Install Python dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio

      - name: Setup database
        run: |
          PGPASSWORD=acip psql -U acip -h localhost -d acip_test \
            -c "CREATE EXTENSION IF NOT EXISTS vector;"
          PGPASSWORD=acip psql -U acip -h localhost -d acip_test -f schema.sql

      - name: Run tests
        run: pytest tests/ -q
        env:
          DATABASE_URL: postgresql://acip:acip@localhost/acip_test
          REDIS_URL: redis://localhost:6379/1

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      # ── Namespace first ────────────────────────────────────────────────────
      - name: Create namespace
        run: kubectl apply -f k8s/namespace.yaml

      # ── CoreDNS — patch to use reliable upstream (K3s default uses /etc/resolv.conf
      #    which is broken inside K3d containers; 8.8.8.8 is always reachable) ──
      - name: Patch CoreDNS upstream
        run: |
          kubectl -n kube-system get configmap coredns -o json \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          d['data']['Corefile'] = d['data']['Corefile'].replace(
              'forward . /etc/resolv.conf', 'forward . 8.8.8.8 8.8.4.4')
          print(json.dumps(d))" \
            | kubectl apply -f -
          kubectl rollout restart deployment/coredns -n kube-system
          kubectl rollout status deployment/coredns -n kube-system --timeout=60s

      # ── ConfigMaps ─────────────────────────────────────────────────────────
      - name: Apply ConfigMaps
        run: kubectl apply -f k8s/configmap.yaml

      # ── Secrets from GitHub Actions secrets ───────────────────────────────
      # Required secrets (set in repo Settings → Secrets → Actions):
      #   KUBECONFIG          - base64-encoded kubeconfig for your cluster
      #   DATABASE_URL        - full postgres DSN (external DB, not in-cluster)
      #                         TheHive:    postgresql://acip:<pw>@172.21.0.1/acip
      #                         Production: postgresql://acip:<pw>@<managed-host>/acip
      #   OPENAI_API_KEY      - for embeddings
      #   ANTHROPIC_API_KEY   - for LLM enrichment
      #   RESEND_API_KEY      - for email (optional, leave blank to disable)
      #
      # Redis stays in-cluster (stateless cache, cheap to lose):
      #   redis://redis-svc.acip.svc.cluster.local:6379
      - name: Apply secrets
        run: |
          kubectl create secret generic acip-secrets \
            --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --from-literal=REDIS_URL="redis://redis-svc.acip.svc.cluster.local:6379" \
            --from-literal=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --from-literal=ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            --from-literal=RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" \
            -n acip --dry-run=client -o yaml | kubectl apply -f -

      # ── Redis (in-cluster — stateless cache, survives empty on restart) ───
      - name: Deploy Redis
        run: kubectl apply -f k8s/redis.yaml

      # ── API + Worker (pinned to the commit SHA image) ──────────────────────
      - name: Deploy API and Worker
        run: |
          IMAGE="ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          sed -i "s|ghcr.io/${{ env.IMAGE_NAME }}:latest|${IMAGE}|g" \
            k8s/api-deployment.yaml k8s/worker-deployment.yaml
          kubectl apply -f k8s/api-deployment.yaml
          kubectl apply -f k8s/worker-deployment.yaml

      # ── Ingress + autoscalers ──────────────────────────────────────────────
      - name: Apply Ingress and HPAs
        run: |
          kubectl apply -f k8s/ingress.yaml
          kubectl apply -f k8s/hpa-api.yaml
          # hpa-worker.yaml requires KEDA — install separately if needed

      # ── Wait for both deployments to become healthy ────────────────────────
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/acip-api -n acip --timeout=5m
          kubectl rollout status deployment/acip-worker -n acip --timeout=5m
