name: Build and Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/acip

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: acip
          POSTGRES_PASSWORD: acip
          POSTGRES_DB: acip_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get install -y libpq-dev

      - name: Install Python dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio

      - name: Setup database (enable pgvector, apply schema)
        run: |
          sudo -u postgres psql -c "CREATE USER acip WITH PASSWORD 'acip';" || true
          sudo -u postgres psql -c "CREATE DATABASE acip_test OWNER acip;" || true
          sudo -u postgres psql -d acip_test -c "CREATE EXTENSION IF NOT EXISTS vector;" || true
          sudo -u postgres psql -d acip_test -c "GRANT ALL ON SCHEMA public TO acip;"
          PGPASSWORD=acip psql -U acip -h localhost -d acip_test -f schema.sql

      - name: Run tests
        run: pytest tests/ -q
        env:
          DATABASE_URL: postgresql://acip:acip@localhost/acip_test
          REDIS_URL: redis://localhost:6379/1

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Update image tags in manifests
        run: |
          sed -i "s|:latest|:${{ github.sha }}|g" k8s/api-deployment.yaml k8s/worker-deployment.yaml

      - name: Apply manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/postgres.yaml
          kubectl apply -f k8s/redis.yaml
          kubectl apply -f k8s/api-deployment.yaml
          kubectl apply -f k8s/worker-deployment.yaml
          kubectl apply -f k8s/ingress.yaml
          kubectl apply -f k8s/hpa-api.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/acip-api -n acip --timeout=5m
          kubectl rollout status deployment/acip-worker -n acip --timeout=5m
